services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: postgis-llm-verify
    environment:
      POSTGRES_DB: gis_demo
      POSTGRES_USER: gis
      POSTGRES_PASSWORD: gis
    ports:
      - "55632:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gis -d gis_demo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgis_data:
